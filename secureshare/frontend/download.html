<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CTB — Download File</title>
<link rel="stylesheet" href="css/main.css"/>
<style>
.dl-wrap{max-width:440px;margin:0 auto;padding:60px 20px}
.dl-file-icon{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;border:1px solid var(--border)}
.dl-filename{font-size:18px;font-weight:800;color:var(--tx-1);word-break:break-all;text-align:center;margin-bottom:6px}
.dl-meta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.dl-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:#fff;border:1px solid var(--border);border-radius:12px;
  padding:14px 20px;display:flex;align-items:center;gap:12px;
  font-size:13px;color:var(--tx-1);box-shadow:var(--shadow-lg);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;
  min-width:260px;max-width:360px;z-index:999}
.dl-toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.dl-toast.error{border-color:rgba(220,38,38,.25);background:#fff5f5}
.dl-toast.success{border-color:rgba(22,163,74,.25);background:#f0fdf4}
.dl-toast-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dl-toast.error .dl-toast-icon{background:rgba(220,38,38,.1)}
.dl-toast.success .dl-toast-icon{background:rgba(22,163,74,.1)}
#dl-btn{position:relative;overflow:hidden;cursor:pointer}
#dl-btn.loading{pointer-events:none;opacity:.7}
.dl-btn-spinner{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
#dl-btn.loading .dl-btn-icon{display:none}
#dl-btn.loading .dl-btn-spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="dl-wrap">
  <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:36px">
    <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--cyan),var(--purple));display:flex;align-items:center;justify-content:center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <span style="font-family:'Orbitron',monospace;font-size:15px;font-weight:800;color:var(--tx-1)">CTB</span>
  </div>

  <!-- Loading -->
  <div id="state-loading" style="text-align:center;padding:40px">
    <div style="width:32px;height:32px;border:2px solid var(--bg-2);border-top-color:var(--cyan);border-radius:50%;margin:0 auto 12px;animation:spin .7s linear infinite"></div>
    <div style="font-size:13px;color:var(--tx-3)">Loading share...</div>
  </div>

  <!-- Ready (no password) -->
  <div id="state-ready" style="display:none">
    <div class="card" style="padding:28px;text-align:center">
      <div class="dl-file-icon" style="background:rgba(2,132,199,.08);border-color:rgba(2,132,199,.2)">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div class="dl-filename" id="dl-name"></div>
      <div class="dl-meta" id="dl-meta"></div>
      <button id="dl-btn" class="btn btn-primary btn-full btn-lg">
        <svg class="dl-btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <div class="dl-btn-spinner"></div>
        Download File
      </button>
      <p style="font-size:11px;color:var(--tx-3);margin-top:14px">Shared via CTB · Verify files before opening</p>
    </div>
  </div>

  <!-- Ready (password protected) -->
  <div id="state-locked" style="display:none">
    <div class="card" style="padding:28px">
      <div style="text-align:center;margin-bottom:20px">
        <div class="dl-file-icon" style="background:rgba(124,58,237,.08);border-color:rgba(124,58,237,.2)">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--purple)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </div>
        <div class="dl-filename" id="dl-name-locked"></div>
        <div class="dl-meta" id="dl-meta-locked"></div>
        <div style="font-size:12px;color:var(--tx-3);margin-bottom:18px">🔒 ไฟล์นี้ถูกป้องกันด้วยรหัสผ่าน</div>
      </div>
      <label class="lbl">รหัสผ่าน</label>
      <div class="kit-pw-wrap" style="margin-bottom:12px">
        <input class="inp" type="password" id="dl-pw-input" placeholder="กรอกรหัสผ่าน..." style="border:none;flex:1" onkeydown="if(event.key==='Enter')doLockedDownload()"/>
        <button type="button" class="kit-pw-eye" onclick="var i=document.getElementById('dl-pw-input');i.type=i.type==='password'?'text':'password'">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div id="dl-pw-err" style="display:none" class="emsg mb12"></div>
      <button id="dl-locked-btn" class="btn btn-primary btn-full btn-lg" onclick="doLockedDownload()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        ดาวน์โหลด
      </button>
      <p style="font-size:11px;color:var(--tx-3);margin-top:14px;text-align:center">Shared via CTB · Verify files before opening</p>
    </div>
  </div>

  <!-- Error -->
  <div id="state-error" style="display:none">
    <div class="card" style="padding:32px;text-align:center;border-color:rgba(220,38,38,.2)">
      <div style="font-size:36px;margin-bottom:12px">⛔</div>
      <div style="font-size:16px;font-weight:800;color:var(--red);margin-bottom:8px" id="err-title">Access Denied</div>
      <div style="font-size:13px;color:var(--tx-3);margin-bottom:20px" id="err-msg"></div>
      <a id="back-btn" class="btn btn-ghost" style="text-decoration:none;cursor:pointer">← กลับไปหน้าหลัก</a>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="dl-toast" id="dl-toast">
  <div class="dl-toast-icon" id="dl-toast-icon"></div>
  <div>
    <div id="dl-toast-title" style="font-weight:700;margin-bottom:2px"></div>
    <div id="dl-toast-msg" style="color:var(--tx-3);font-size:12px"></div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
(async () => {
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) { showError('ไม่พบ Token', 'URL ไม่มี share token'); return; }

  let shareData, szFmt, ttlStr;

  function fmtSize(s) { return s < 1048576 ? (s/1024).toFixed(1)+' KB' : (s/1048576).toFixed(1)+' MB'; }
  function fmtTtl(exp) {
    if (!exp) return 'ไม่มีวันหมดอายุ';
    const d = new Date(exp) - Date.now();
    if (d <= 0) return 'หมดอายุแล้ว';
    const h = Math.floor(d/3600000), days = Math.floor(h/24);
    return days > 0 ? `หมดอายุใน ${days} วัน` : `หมดอายุใน ${h}h`;
  }
  function metaHTML(count) {
    return `<span class="badge bdg-blue">${szFmt}</span>` +
           `<span class="badge bdg-green">${count} downloads</span>` +
           `<span class="badge bdg-amber">${ttlStr}</span>`;
  }
  function showToast(type, title, msg) {
    const t = document.getElementById('dl-toast'), ic = document.getElementById('dl-toast-icon');
    t.className = `dl-toast ${type}`;
    document.getElementById('dl-toast-title').textContent = title;
    document.getElementById('dl-toast-msg').textContent   = msg;
    ic.innerHTML = type === 'error'
      ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`
      : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }
  function triggerBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }

  try {
    const { share } = await Shares.getInfo(token);
    if (share.expired)       { showError('หมดอายุ', 'ลิงก์นี้หมดอายุแล้ว'); return; }
    if (share.limit_reached) { showError('ครบจำนวน', 'ไฟล์นี้ถูกดาวน์โหลดครบจำนวนที่กำหนดแล้ว'); return; }

    shareData = share;
    szFmt  = fmtSize(share.file_size);
    ttlStr = fmtTtl(share.expires_at);

    document.getElementById('state-loading').style.display = 'none';

    // ── PASSWORD PROTECTED ──────────────────────────────
    if (share.has_password) {
      document.getElementById('dl-name-locked').textContent = share.original_name;
      document.getElementById('dl-meta-locked').innerHTML   = metaHTML(share.download_count);
      document.getElementById('state-locked').style.display = '';
      setTimeout(() => document.getElementById('dl-pw-input').focus(), 100);

      document.getElementById('dl-locked-btn').onclick = async function() {
        const pw  = document.getElementById('dl-pw-input').value;
        const err = document.getElementById('dl-pw-err');
        const btn = document.getElementById('dl-locked-btn');
        if (!pw) { err.textContent = 'กรอกรหัสผ่านด้วย'; err.style.display = 'block'; return; }
        btn.disabled = true; btn.textContent = 'กำลังตรวจสอบ...'; err.style.display = 'none';
        try {
          const API_BASE = (window.location.port==='5500'||window.location.port==='3000')
            ? 'http://localhost:3001/api' : '/api';
          const resp = await fetch(`${API_BASE}/shares/dl/${token}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pw }),
          });
          if (!resp.ok) {
            const e = (await resp.json().catch(() => ({}))).error || '';
            err.textContent = e === 'WRONG_PASSWORD' ? '❌ รหัสผ่านไม่ถูกต้อง' : e;
            err.style.display = 'block';
          } else {
            triggerBlob(await resp.blob(), shareData.original_name);
            showToast('success', 'ดาวน์โหลดสำเร็จ', shareData.original_name);
            setTimeout(async () => {
              try { const {share:u}=await Shares.getInfo(token); document.getElementById('dl-meta-locked').innerHTML=metaHTML(u.download_count); } catch(_){}
            }, 800);
          }
        } catch(_) { err.textContent = 'เกิดข้อผิดพลาด'; err.style.display = 'block'; }
        btn.disabled = false; btn.textContent = 'ดาวน์โหลด';
      };

      document.getElementById('dl-pw-input').onkeydown = (e) => {
        if (e.key === 'Enter') document.getElementById('dl-locked-btn').click();
      };
      return;
    }

    // ── NO PASSWORD ─────────────────────────────────────
    document.getElementById('dl-name').textContent  = share.original_name;
    document.getElementById('dl-meta').innerHTML    = metaHTML(share.download_count);
    document.getElementById('state-ready').style.display = '';

    document.getElementById('dl-btn').addEventListener('click', async () => {
      const btn = document.getElementById('dl-btn');
      btn.classList.add('loading');
      try {
        const resp = await fetch(Shares.getDownloadUrl(token));
        if (!resp.ok) {
          const e = (await resp.json().catch(() => ({}))).error || '';
          showToast('error', 'ดาวน์โหลดล้มเหลว', e);
          return;
        }
        triggerBlob(await resp.blob(), shareData.original_name);
        showToast('success', 'ดาวน์โหลดสำเร็จ', shareData.original_name);
        setTimeout(async () => {
          try { const {share:u}=await Shares.getInfo(token); document.getElementById('dl-meta').innerHTML=metaHTML(u.download_count); } catch(_){}
        }, 800);
      } catch(_) { showToast('error', 'ล้มเหลว', 'เกิดข้อผิดพลาด กรุณาลองใหม่'); }
      btn.classList.remove('loading');
    });

  } catch(_) {
    showError('ไม่พบไฟล์', 'ไฟล์นี้ถูกลบหรือไม่มีอยู่แล้ว');
  }

  document.getElementById('back-btn').addEventListener('click', () => {
    window.location.href = window.location.href.replace(/\/[^/]*(\?.*)?$/, '/index.html');
  });

  function showError(title, msg) {
    document.getElementById('state-loading').style.display = 'none';
    document.getElementById('state-ready').style.display   = 'none';
    document.getElementById('state-locked').style.display  = 'none';
    document.getElementById('err-title').textContent = title;
    document.getElementById('err-msg').textContent   = msg;
    document.getElementById('state-error').style.display = '';
  }

})();
</script>
</body>
</html>
